name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          current=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          bump=${{ github.event.inputs.bump }}
          IFS='.' read -r major minor patch <<< "$current"
          if [ "$bump" = "major" ]; then
            major=$((major+1))
            minor=0
            patch=0
          elif [ "$bump" = "minor" ]; then
            minor=$((minor+1))
            patch=0
          else
            patch=$((patch+1))
          fi
          next="$major.$minor.$patch"
          echo "semver_major=$major" >> "$GITHUB_OUTPUT"
          echo "semver_minor=$major.$minor" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          sed -i -E "0,/^version = \".*\"/s//version = \"$next\"/" Cargo.toml
          cargo check
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): v$next"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.version.outputs.version }} --unreleased

      - name: Update changelog file
        run: |
          printf "%s\n" "${{ steps.changelog.outputs.content }}" > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.semver_minor }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.semver_major }}
            ghcr.io/${{ github.repository }}:stable
            ghcr.io/${{ github.repository }}:latest

      - name: Create Git tag
        run: git tag v${{ steps.version.outputs.version }}

      - name: Push changes
        run: |
          git push origin HEAD
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
